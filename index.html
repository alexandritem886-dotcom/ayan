<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusNote - ADHD Note App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <section class="hero">
        <h1>FocusNote</h1>
        <p class="tagline">Clear your mind, one note at a time. Stay on track.</p>
    </section>

    <section class="note-section">
        <div class="input-group">
            <textarea id="note-input" placeholder="spill the beans..."></textarea>
            <button id="add-note">Add Note</button>
        </div>
        
            <div id="note-list">
            </div>
    </section>
    </div>
    <script src="note.js"></script>
</body>
</html>
